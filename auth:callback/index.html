<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Discord · Pharos</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#0a0c10;color:#e2e6f0;
    font-family:'IBM Plex Mono',monospace;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;flex-direction:column;gap:16px;text-align:center;
  }
  .spinner{
    width:36px;height:36px;border:2px solid rgba(27,189,138,0.2);
    border-top-color:#1bbd8a;border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{font-size:13px;color:#8b93a8;letter-spacing:0.06em;margin-top:8px;}
  .error{color:#e84848;font-size:12px;max-width:400px;line-height:1.6;margin-top:16px;}
  .btn{
    display:inline-block;margin-top:20px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:#1bbd8a;text-decoration:none;
    border:1px solid rgba(27,189,138,0.4);
    border-radius:6px;padding:8px 18px;
    transition:background .2s;
  }
  .btn:hover{background:rgba(27,189,138,0.08);}
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Vérification Discord…</div>
<div class="error" id="error" style="display:none;"></div>
<a href="https://BJBellum.github.io/UKN/" class="btn" id="back-btn" style="display:none;">← Retour au portail</a>

<script>
(function() {
  const SESSION_TOKEN_KEY = 'pharos_token';
  const SESSION_USER_KEY  = 'pharos_user';

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Échec de la connexion';
    const err = document.getElementById('error');
    err.textContent = msg;
    err.style.display = 'block';
    document.getElementById('back-btn').style.display = 'inline-block';
  }

  function parseHash() {
    const hash = window.location.hash.slice(1);
    if (!hash) return null;
    const params = new URLSearchParams(hash);
    return {
      access_token: params.get('access_token'),
      token_type  : params.get('token_type'),
      expires_in  : params.get('expires_in'),
      state       : params.get('state'),
      error       : params.get('error'),
      error_description: params.get('error_description'),
    };
  }

  async function run() {
    const data = parseHash();

    // Handle Discord error
    if (!data || data.error) {
      const desc = (data && data.error_description) || 'Autorisation refusée ou annulée.';
      showError('Discord : ' + desc);
      return;
    }

    if (!data.access_token) {
      showError('Aucun token reçu de Discord. Vérifie que le Client ID et l\'URI de redirection sont bien configurés dans le Discord Developer Portal.');
      return;
    }

    // Store token for pharos-auth.js to pick up
    try {
      const _expires = Date.now() + (parseInt(data.expires_in, 10) || 604800) * 1000;
      localStorage.setItem(SESSION_TOKEN_KEY, JSON.stringify({ token: data.access_token, expires: _expires }));
      // Clear any stale user cache so pharos-auth.js re-fetches
      localStorage.removeItem(SESSION_USER_KEY);
    } catch (e) {
      showError('Impossible d\'accéder au stockage de session. Vérifie les paramètres de ton navigateur.');
      return;
    }

    // Determine return URL from state
    let returnURL = 'https://BJBellum.github.io/UKN/';
    if (data.state && data.state !== 'base') {
      try {
        // State was encoded as btoa(encodeURIComponent(url))
        const decoded = decodeURIComponent(atob(data.state));
        if (decoded.startsWith('https://BJBellum.github.io/UKN/')) {
          // Never redirect back to admin/ from a login — admin accesses it manually via nav button
          if (!decoded.includes('/admin/')) {
            returnURL = decoded;
          }
        }
      } catch {
        // Fallback: try old encoding (btoa of raw url)
        try {
          const pad = data.state + '=='.slice((data.state.length * 3) % 4);
          const decoded2 = atob(pad);
          if (decoded2.startsWith('https://BJBellum.github.io/UKN/') && !decoded2.includes('/admin/')) {
            returnURL = decoded2;
          }
        } catch {}
      }
    }

    document.getElementById('msg').textContent = 'Connexion réussie, redirection…';
    setTimeout(() => { window.location.replace(returnURL); }, 800);
  }

  run().catch(e => showError('Erreur inattendue : ' + e.message));
})();
</script>
</body>
</html>
