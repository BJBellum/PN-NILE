<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue Militaire · Forces Armées du Nil</title>
<meta property="og:image" content="https://BJBellum.github.io/UKN/assets/images/UKNSite.png">
<link rel="icon" type="image/png" href="../../assets/images/UKNSite.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/dune.css">
<style>
*{box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

/* ── NAV ── */
.cat-nav{
  position:fixed;top:0;left:0;right:0;height:54px;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(8,5,0,.97);border-bottom:1px solid rgba(232,92,13,.25);
}
[data-theme="light"] .cat-nav{background:rgba(222,198,152,.97);}

/* ── SHELL ── */
.cat-shell{position:fixed;top:54px;left:0;right:0;bottom:0;display:flex;overflow:hidden;}

/* ── SIDEBAR ── */
.cat-sidebar{
  width:236px;flex-shrink:0;
  background:#090601;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
[data-theme="light"] .cat-sidebar{background:#C4A468;}

.sb-top{flex-shrink:0;}
.sb-hdr{padding:13px 16px 9px;border-bottom:1px solid var(--border);}
.sb-hdr-name{font-family:'Dune Rise',serif;font-size:9px;letter-spacing:.2em;color:var(--spice);}
.sb-hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.1em;margin-top:2px;}
.sb-total{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.06em;padding:5px 16px;border-bottom:1px solid var(--border);}
.sb-srch-wrap{padding:7px 12px;border-bottom:1px solid var(--border);}
.sb-srch{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 8px;border-radius:2px;outline:none;}
.sb-srch:focus{border-color:var(--spice);}
.sb-scroll{flex:1;overflow-y:auto;}

/* Groups */
.sb-group{border-bottom:1px solid var(--border);}
.sb-grp-hdr{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);
  letter-spacing:.05em;cursor:pointer;user-select:none;transition:background .15s;
}
.sb-grp-hdr:hover{background:rgba(232,92,13,.06);}
.sb-arr{color:var(--text3);transition:transform .22s;flex-shrink:0;line-height:1;display:flex;align-items:center;}
.sb-arr.open{transform:rotate(90deg);}
.sb-grp-ico{flex-shrink:0;display:flex;align-items:center;color:var(--spice);opacity:.7;}
.sb-grp-lbl{flex:1;line-height:1.3;}
.sb-grp-cnt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}
.sb-children{background:rgba(0,0,0,.14);}
[data-theme="light"] .sb-children{background:rgba(0,0,0,.05);}

/* Sub items */
.sb-sub{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px 7px 32px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);
  letter-spacing:.05em;cursor:pointer;user-select:none;
  transition:all .15s;border-left:2px solid transparent;
}
.sb-sub:hover{background:rgba(232,92,13,.07);color:var(--text2);}
.sb-sub.active{background:rgba(232,92,13,.12);color:var(--spice);border-left-color:var(--spice);}
.sb-sub-cnt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}
.sb-sub.active .sb-sub-cnt{color:var(--spice);border-color:rgba(232,92,13,.35);}

/* ── MAIN ── */
.cat-main{flex:1;overflow-y:auto;background:var(--bg);}
.cat-content{padding:22px 28px 60px;}
@media(max-width:760px){.cat-sidebar{display:none;}.cat-content{padding:14px;}}

/* ── SECTION anchor ── */
.cat-section{margin-bottom:44px;}
.cat-sec-anchor{scroll-margin-top:8px;}
.cat-sec-hdr{
  display:flex;align-items:baseline;gap:12px;
  margin-bottom:14px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.cat-sec-title{font-family:'Dune Rise',serif;font-size:clamp(12px,1.5vw,16px);color:var(--spice);letter-spacing:.1em;}
.cat-sec-count{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.08em;}

/* ── SLIDE (full-width item) ── */
.cat-slide{
  background:var(--card-bg);
  border:1px solid var(--border);border-left:3px solid rgba(232,92,13,.4);
  margin-bottom:10px;overflow:hidden;
  transition:border-left-color .2s;
}
.cat-slide:hover{border-left-color:var(--spice);}

/* Slide header row */
.slide-hdr{
  display:flex;align-items:stretch;min-height:120px;cursor:pointer;
}
.slide-img-zone{
  width:200px;flex-shrink:0;overflow:hidden;
  background:var(--bg2);position:relative;
}
.slide-img-zone img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.cat-slide:hover .slide-img-zone img{transform:scale(1.05);}
.slide-img-ph{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:var(--bg2);
}
.slide-img-ph-ico{opacity:.2;display:flex;}
.slide-img-ph-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.12em;}

/* Slide info zone */
.slide-info{flex:1;display:flex;flex-direction:column;padding:0;}

/* Top info bar: name + badges */
.slide-info-top{
  display:flex;align-items:stretch;flex:1;border-bottom:1px solid var(--border);
}
.slide-name-block{
  flex:1;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;
  border-right:1px solid var(--border);
}
.slide-name{
  font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--text);
  font-weight:500;letter-spacing:.04em;margin-bottom:4px;
}
.slide-fab{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.06em;margin-bottom:8px;}
.slide-niv{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 7px;border-radius:2px;border:1px solid;display:inline-block;}

/* Badges column */
.slide-badges{
  display:flex;flex-direction:column;width:160px;flex-shrink:0;
}
.slide-badge{
  flex:1;padding:0 12px;display:flex;flex-direction:column;justify-content:center;text-align:center;
  border-bottom:1px solid var(--border);
}
.slide-badge:last-child{border-bottom:none;}
.bdg-lbl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;}
.bdg-val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bdg-val.spice{color:var(--spice);}
.bdg-val.gold{color:var(--gold);font-family:'Dune Rise',serif;}
.bdg-val.green{color:var(--teal-bright);font-size:10px;}

/* Slide bottom toggle bar */
.slide-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;cursor:pointer;user-select:none;
  background:rgba(0,0,0,.08);transition:background .15s;
  border-top:1px solid var(--border);
}
[data-theme="light"] .slide-toggle{background:rgba(0,0,0,.04);}
.slide-toggle:hover{background:rgba(232,92,13,.05);}
.slide-toggle-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.08em;display:flex;align-items:center;gap:6px;transition:color .15s;}
.slide-toggle-tri{font-size:12px;transition:transform .2s;display:inline-block;}
.cat-slide.open .slide-toggle-lbl{color:var(--spice);}
.cat-slide.open .slide-toggle-tri{transform:rotate(90deg);}

/* Spec panel */
.slide-specs{display:none;border-top:1px solid rgba(232,92,13,.15);background:rgba(0,0,0,.1);}
[data-theme="light"] .slide-specs{background:rgba(0,0,0,.03);}
.cat-slide.open .slide-specs{display:block;}
.spec-hdr{font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:.18em;color:var(--spice);text-transform:uppercase;padding:8px 14px 6px;border-bottom:1px solid rgba(232,92,13,.12);}
.spec-tbl{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:10px;}
.spec-tbl tr:hover td{background:rgba(232,92,13,.02);}
.spec-tbl td{padding:5px 14px;border-bottom:1px solid var(--border);vertical-align:top;}
.spec-tbl td:first-child{color:var(--text3);font-size:9px;width:38%;letter-spacing:.05em;}
.spec-tbl td:last-child{color:var(--text);}
.spec-tbl tr:last-child td{border-bottom:none;}

/* NIV colors */
.niv-1,.niv-2{color:#9B8060;border-color:rgba(155,128,96,.35);}
.niv-3,.niv-4{color:#C87830;border-color:rgba(200,120,48,.35);}
.niv-5,.niv-6{color:#D4A843;border-color:rgba(212,168,67,.35);}
.niv-7,.niv-8{color:#22B89A;border-color:rgba(34,184,154,.35);}
.niv-9,.niv-10{color:#4A9EFF;border-color:rgba(74,158,255,.35);}
.niv-11,.niv-12{color:#E85C0D;border-color:rgba(232,92,13,.35);}

/* Empty */
.cat-empty{text-align:center;padding:72px 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.1em;line-height:2;}
.cat-empty-ico{margin-bottom:16px;opacity:.2;display:flex;justify-content:center;}

@media(max-width:640px){
  .slide-hdr{flex-direction:column;}
  .slide-img-zone{width:100%;height:160px;}
  .slide-badges{width:100%;flex-direction:row;}
  .slide-badge{border-bottom:none;border-right:1px solid var(--border);}
  .slide-badge:last-child{border-right:none;}
}

/* ── DETAIL OVERLAY ── */
.detail-ov{
  position:fixed;inset:0;z-index:500;
  background:rgba(4,2,0,.96);
  display:none;flex-direction:column;overflow:hidden;
}
.detail-ov.open{display:flex;}

/* Nav bar inside overlay */
.detail-nav{
  flex-shrink:0;height:50px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(8,5,0,.98);border-bottom:1px solid rgba(232,92,13,.2);
  z-index:10;
}
.detail-nav-back{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);
  text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:2px;
  transition:all .15s;background:transparent;
}
.detail-nav-back:hover{border-color:var(--spice);color:var(--spice);}
.detail-nav-ref{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.12em;}

/* Scroll body */
.detail-body{flex:1;overflow-y:auto;}

/* ── IMAGE HERO (2000x1000 ratio = 2:1) ── */
.detail-img-hero{
  width:100%;aspect-ratio:2/1;
  background:var(--bg2);overflow:hidden;
  position:relative;border-bottom:1px solid var(--border);
  max-height:55vh;
}
.detail-img-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.detail-img-ph{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:var(--bg2);
}
.detail-img-ph-ico{opacity:.15;display:flex;}
.detail-img-ph-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;}

/* ── 3 KEY CHARACTERISTICS ── */
.detail-keys{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  border-bottom:1px solid var(--border);
}
.detail-key{
  padding:18px 22px;text-align:center;
  border-right:1px solid var(--border);
}
.detail-key:last-child{border-right:none;}
.dk-lbl{
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;
}
.dk-val{
  font-family:'IBM Plex Mono',monospace;font-size:14px;
  color:var(--text);letter-spacing:.04em;
}
.dk-val.spice{color:var(--spice);font-size:13px;}
.dk-val.gold{color:var(--gold);font-family:'Dune Rise',serif;font-size:15px;}
.dk-val.green{color:var(--teal-bright);font-size:12px;}

/* ── SPECS SECTION ── */
.detail-specs-wrap{padding:24px 28px 48px;}
.detail-specs-hdr{
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  letter-spacing:.18em;color:var(--spice);text-transform:uppercase;
  padding-bottom:8px;border-bottom:1px solid rgba(232,92,13,.2);margin-bottom:16px;
}

/* 3-column specs grid */
.detail-specs-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:0;
  border:1px solid var(--border);
}
@media(max-width:800px){.detail-specs-grid{grid-template-columns:1fr;}}
@media(max-width:1100px) and (min-width:801px){.detail-specs-grid{grid-template-columns:1fr 1fr;}}

.detail-spec-item{
  padding:9px 14px;border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:3px;
}
.detail-spec-item:nth-child(3n){border-right:none;}
@media(max-width:1100px) and (min-width:801px){
  .detail-spec-item:nth-child(2n){border-right:none;}
  .detail-spec-item:nth-child(3n){border-right:1px solid var(--border);}
}
@media(max-width:800px){
  .detail-spec-item{border-right:none;}
  .detail-spec-item:nth-child(3n){border-right:none;}
}
.dsi-key{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.08em;}
.dsi-val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);letter-spacing:.03em;}

/* Info bar: fabricant + niv */
.detail-info-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 28px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.08);flex-wrap:wrap;gap:8px;
}
[data-theme="light"] .detail-info-bar{background:rgba(0,0,0,.03);}
.detail-fab{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:.06em;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="cat-nav">
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-family:'Dune Rise',serif;font-size:10px;letter-spacing:.18em;color:var(--spice);">Catalogue Militaire</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.1em;border:1px solid rgba(232,92,13,.2);padding:2px 7px;border-radius:2px;">CAT-MIL-001</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="../" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:5px 10px;border-radius:2px;">&#8592; Catalogues</a>
    <button onclick="toggleTheme()" style="background:transparent;border:1px solid var(--border);color:var(--text3);padding:5px 10px;font-family:'IBM Plex Mono',monospace;font-size:9px;cursor:pointer;border-radius:2px;"><span id="tlbl">NUIT</span></button>
  </div>
</nav>

<!-- SHELL -->
<div class="cat-shell">

  <!-- SIDEBAR -->
  <aside class="cat-sidebar">
    <div class="sb-top">
      <div class="sb-hdr">
        <div class="sb-hdr-name">Categories</div>
        <div class="sb-hdr-sub">Forces Armees du Nil · 2305</div>
      </div>
      <div class="sb-total" id="sb-total">— equipements</div>
      <div class="sb-srch-wrap">
        <input type="text" class="sb-srch" id="cat-search" placeholder="Rechercher…" oninput="onSearch()">
      </div>
    </div>
    <div class="sb-scroll" id="sb-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="cat-main" id="cat-main">
    <div class="cat-content" id="cat-content">
      <div class="cat-empty">
        <div class="cat-empty-ico">
          <svg viewBox="0 0 48 48" fill="none" width="48" height="48">
            <path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/>
            <path d="M18 24h12M24 18v12" stroke="#4A3C28" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        Selectionnez une categorie dans la barre laterale.
      </div>
    </div>
  </main>

</div>

<script>
// ── SVG ICONS (no emojis) ──────────────────
var ICONS={
  terrestre:'<svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M8 2L2 5v4c0 3.5 2.5 6 6 7 3.5-1 6-3.5 6-7V5L8 2Z" stroke="currentColor" stroke-width="1.1" fill="none"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><line x1="8" y1="5" x2="8" y2="11" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>',
  aerien:'<svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M9 3c0 0 2 1 2 3L14 8l-3 1-2-2H7L5 9H3L2 8l3-2c0-2 1-3 1-3H9Z" stroke="currentColor" stroke-width="1" fill="none" stroke-linejoin="round"/><path d="M7 11l1 2h1l1-2" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  naval:'<svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M3 10L8 4l5 6H3Z" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linejoin="round"/><line x1="8" y1="4" x2="8" y2="2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M2 12c1.5 1.5 10 1.5 12 0" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" fill="none"/></svg>',
  missiles:'<svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M10 2L14 6l-8 8-4-1-1-4 9-8Z" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linejoin="round"/><path d="M7 9l2-2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M2 14l3-1" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity=".5"/></svg>',
  shield:'<svg viewBox="0 0 48 48" fill="none" width="40" height="40"><path d="M24 6L6 13V24C6 34 14 42 24 45C34 42 42 34 42 24V13L24 6Z" stroke="#3A2E1E" stroke-width="1.5" fill="none"/></svg>'
};

// ── DATA ──────────────────────────────────
var GROUPS=[
  {id:'terrestre',label:'Terrestre',icon:'terrestre',sub:[
    {id:'armes-feu',            label:'Armes a Feu'},
    {id:'explosifs',            label:'Explosifs & Grenades'},
    {id:'vehicules-terrestres', label:'Vehicules Terrestres'},
    {id:'artillerie',           label:'Artillerie Placee'}
  ]},
  {id:'aerien',label:'Aerien',icon:'aerien',sub:[
    {id:'aeronefs',label:'Vehicules Aeriens Militaires'}
  ]},
  {id:'naval',label:'Naval',icon:'naval',sub:[
    {id:'navires',    label:'Navires de Surface'},
    {id:'sous-marins',label:'Sous-marins'}
  ]},
  {id:'balistique',label:'Balistique & Spatial',icon:'missiles',sub:[
    {id:'missiles',             label:'Missiles & Roquettes'},
    {id:'missiles-strategiques',label:'Missiles Strategiques'}
  ]}
];
var TECH={1:'1910-1919',2:'1920-1929',3:'1930-1939',4:'1940-1949',5:'1950-1959',6:'1960-1969',7:'1970-1979',8:'1980-1989',9:'1990-1999',10:'2000-2009',11:'2010-2019',12:'2020+'};

// ── STATE ─────────────────────────────────
var catalogue=[];
var openG={terrestre:true,aerien:true,naval:true,balistique:true};
var activeCat='';
var searchQ='';

// ── LOAD ──────────────────────────────────
function loadLocal(){
  try{var s=localStorage.getItem('cat_militaire');catalogue=s?JSON.parse(s):[];}
  catch(e){catalogue=[];}
}
function syncGH(){
  fetch('https://api.github.com/repos/BJBellum/UKN/contents/data/catalogue-militaire.json',{
    headers:{'Accept':'application/vnd.github.v3.raw'},cache:'no-store'
  }).then(function(r){return r.ok?r.json():null;})
  .then(function(d){
    if(!d||!Array.isArray(d))return;
    d.forEach(function(remote){
      var loc=catalogue.find(function(x){return x.id===remote.id;});
      if(loc&&loc.image_data&&!remote.image_data)remote.image_data=loc.image_data;
    });
    catalogue=d;
    localStorage.setItem('cat_militaire',JSON.stringify(catalogue));
    renderSidebar();
    renderContent();
  }).catch(function(){});
}

// ── SIDEBAR ───────────────────────────────
function renderSidebar(){
  var tot=catalogue.length;
  var el=document.getElementById('sb-total');
  if(el)el.textContent=tot+' equipement'+(tot!==1?'s':'');
  var list=document.getElementById('sb-list');
  if(!list)return;
  var html='';
  GROUPS.forEach(function(g){
    var gTot=catalogue.filter(function(i){return g.sub.some(function(s){return s.id===i.categorie;});}).length;
    var isOpen=!!openG[g.id];
    html+='<div class="sb-group">';
    html+='<div class="sb-grp-hdr" onclick="toggleG(\''+g.id+'\')">';
    html+='<span class="sb-arr'+(isOpen?' open':'')+'"><svg viewBox="0 0 8 12" fill="none" width="8" height="12"><path d="M2 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    html+='<span class="sb-grp-ico">'+ICONS[g.icon]+'</span>';
    html+='<span class="sb-grp-lbl">'+g.label+'</span>';
    html+='<span class="sb-grp-cnt">'+gTot+'</span>';
    html+='</div>';
    if(isOpen){
      html+='<div class="sb-children">';
      g.sub.forEach(function(sub){
        var cnt=catalogue.filter(function(i){return i.categorie===sub.id;}).length;
        var isAct=sub.id===activeCat;
        html+='<div class="sb-sub'+(isAct?' active':'')+'\" onclick="selectCat(\''+sub.id+'\')">';
        html+='<span>'+sub.label+'</span>';
        html+='<span class="sb-sub-cnt">'+cnt+'</span>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  list.innerHTML=html;
}

function toggleG(id){openG[id]=!openG[id];renderSidebar();}

function selectCat(id){
  activeCat=id;searchQ='';
  var si=document.getElementById('cat-search');if(si)si.value='';
  renderSidebar();
  renderContent();
  // Scroll to section anchor
  setTimeout(function(){
    var anchor=document.getElementById('sec-'+id);
    if(anchor){
      var main=document.getElementById('cat-main');
      if(main)main.scrollTo({top:anchor.offsetTop-8,behavior:'smooth'});
    }
  },60);
}

function onSearch(){
  searchQ=(document.getElementById('cat-search').value||'').toLowerCase();
  if(searchQ)activeCat='';
  renderSidebar();
  renderContent();
}

// ── CONTENT ── slides layout ──────────────
function renderContent(){
  var el=document.getElementById('cat-content');
  if(!el)return;

  var allSub=[];
  GROUPS.forEach(function(g){g.sub.forEach(function(s){allSub.push(s);});});

  // Search mode: flat list
  if(searchQ){
    var items=catalogue.filter(function(i){
      return (i.nom||'').toLowerCase().indexOf(searchQ)>=0||
             (i.fabricant||'').toLowerCase().indexOf(searchQ)>=0||
             (i.inspiration||'').toLowerCase().indexOf(searchQ)>=0;
    });
    if(!items.length){
      el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico">'+ICONS.shield+'</div>Aucun resultat pour "'+searchQ+'".</div>';
      return;
    }
    el.innerHTML='<div class="cat-sec-hdr"><span class="cat-sec-title">RESULTATS DE RECHERCHE</span><span class="cat-sec-count">'+items.length+' resultat'+(items.length!==1?'s':'')+'</span></div>'+buildSlides(items);
    return;
  }

  // Category selected: single section
  if(activeCat){
    var items=catalogue.filter(function(i){return i.categorie===activeCat;});
    var catInfo=allSub.find(function(s){return s.id===activeCat;})||{label:activeCat};
    if(!items.length){
      el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico">'+ICONS.shield+'</div>Aucun equipement dans cette categorie.</div>';
      return;
    }
    el.innerHTML='<div id="sec-'+activeCat+'" class="cat-section cat-sec-anchor"><div class="cat-sec-hdr"><span class="cat-sec-title">'+catInfo.label.toUpperCase()+'</span><span class="cat-sec-count">'+items.length+' equipement'+(items.length!==1?'s':'')+' · FAN · 2305</span></div>'+buildSlides(items)+'</div>';
    return;
  }

  // Default: show ALL sections
  var html='';
  var totalShown=0;
  GROUPS.forEach(function(g){
    g.sub.forEach(function(sub){
      var items=catalogue.filter(function(i){return i.categorie===sub.id;});
      if(!items.length)return;
      totalShown+=items.length;
      html+='<div id="sec-'+sub.id+'" class="cat-section cat-sec-anchor">';
      html+='<div class="cat-sec-hdr"><span class="cat-sec-title">'+sub.label.toUpperCase()+'</span><span class="cat-sec-count">'+items.length+' equipement'+(items.length!==1?'s':'')+'</span></div>';
      html+=buildSlides(items);
      html+='</div>';
    });
  });
  if(!totalShown){
    el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico">'+ICONS.shield+'</div>Selectionnez une categorie dans la barre laterale.</div>';
    return;
  }
  el.innerHTML=html;
}

function buildSlides(items){
  var html='';
  items.forEach(function(item){
    var niv=item.niveau||1;
    var nivLbl='NIV '+niv+' · '+(TECH[niv]||'');
    var imgSrc=item.image_data||(item.image_path?'https://bjbellum.github.io/UKN/'+item.image_path:'');
    var specs=item.specs||{};
    var specRows=Object.keys(specs).filter(function(k){return specs[k];}).map(function(k){
      return '<tr><td>'+k+'</td><td>'+specs[k]+'</td></tr>';
    }).join('');
    var coutFmt=item.cout_unite?Number(item.cout_unite).toLocaleString('fr')+' N\u00a3':'—';
    var dispo=item.disponibilite||'';

    html+='<div class="cat-slide" id="slide-'+item.id+'">';

    // Header row (image + info + badges)
    html+='<div class="slide-hdr" onclick="openDetail(\''+item.id+'\')" style="cursor:pointer;" title="Voir la fiche complète">';

    // Image
    html+='<div class="slide-img-zone">';
    if(imgSrc){
      html+='<img src="'+imgSrc+'" alt="'+(item.nom||'')+'" loading="lazy">';
    } else {
      html+='<div class="slide-img-ph"><div class="slide-img-ph-ico"><svg viewBox="0 0 40 40" fill="none" width="40" height="40"><rect x="4" y="6" width="32" height="26" rx="2" stroke="#3A2E1E" stroke-width="1.2" fill="none"/><circle cx="13" cy="16" r="4" stroke="#3A2E1E" stroke-width="1" fill="none"/><path d="M4 28l8-7 6 5 5-4 11 9" stroke="#3A2E1E" stroke-width="1" fill="none"/></svg></div><span class="slide-img-ph-lbl">AUCUNE IMAGE</span></div>';
    }
    html+='</div>';

    // Info
    html+='<div class="slide-info">';
    html+='<div class="slide-info-top">';
    html+='<div class="slide-name-block">';
    html+='<div class="slide-name">'+(item.nom||'—')+'</div>';
    html+='<div class="slide-fab">'+(item.fabricant||'—')+'</div>';
    html+='<span class="slide-niv niv-'+niv+'">'+nivLbl+'</span>';
    html+='</div>';
    // Badges column: Inspiration | Coût | Disponibilité
    html+='<div class="slide-badges">';
    html+='<div class="slide-badge"><div class="bdg-lbl">Inspiration</div><div class="bdg-val spice" title="'+(item.inspiration||'—')+'">'+(item.inspiration||'—')+'</div></div>';
    html+='<div class="slide-badge"><div class="bdg-lbl">Cout unitaire</div><div class="bdg-val gold">'+coutFmt+'</div></div>';
    html+='<div class="slide-badge"><div class="bdg-lbl">Disponibilite</div><div class="bdg-val green" title="'+dispo+'">'+(dispo||'—')+'</div></div>';
    html+='</div>';
    html+='</div></div></div>'; // /slide-info-top /slide-info /slide-hdr

    // Toggle bar
    html+='<div class="slide-toggle" onclick="toggleSlide(\''+item.id+'\')">';
    html+='<div class="slide-toggle-lbl"><svg viewBox="0 0 12 12" fill="none" width="10" height="10"><rect x="1" y="1" width="10" height="10" rx="1" stroke="currentColor" stroke-width="1" fill="none"/><line x1="3" y1="4" x2="9" y2="4" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="3" y1="6.5" x2="9" y2="6.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="3" y1="9" x2="7" y2="9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg> Fiche technique<span class="slide-toggle-tri">&#8250;</span></div>';
    html+='</div>';

    // Specs
    html+='<div class="slide-specs">';
    html+='<div class="spec-hdr">Caracteristiques techniques</div>';
    if(specRows){
      html+='<table class="spec-tbl"><tbody>'+specRows+'</tbody></table>';
    } else {
      html+='<div style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:var(--text3);padding:12px 14px;">Aucune specification renseignee.</div>';
    }
    html+='</div>';

    html+='</div>'; // /cat-slide
  });
  return html;
}

function toggleSlide(id){
  var el=document.getElementById('slide-'+id);
  if(el)el.classList.toggle('open');
}

function openDetail(id){
  var item=catalogue.find(function(x){return x.id===id;});
  if(!item)return;
  var niv=item.niveau||1;
  var nivLbl='NIV '+niv+' · '+(TECH[niv]||'');
  var imgSrc=item.image_data||(item.image_path?'https://bjbellum.github.io/UKN/'+item.image_path:'');
  var specs=item.specs||{};
  var specKeys=Object.keys(specs).filter(function(k){return specs[k];});
  var coutFmt=item.cout_unite?Number(item.cout_unite).toLocaleString('fr')+' N£':'—';
  var dispo=item.disponibilite||'—';

  // Build spec items for 3-col grid
  var specItemsHTML='';
  specKeys.forEach(function(k){
    specItemsHTML+='<div class="detail-spec-item"><div class="dsi-key">'+k+'</div><div class="dsi-val">'+specs[k]+'</div></div>';
  });
  // Pad to multiple of 3
  var rem=specKeys.length%3;
  if(rem===1){specItemsHTML+='<div class="detail-spec-item"></div><div class="detail-spec-item"></div>';}
  if(rem===2){specItemsHTML+='<div class="detail-spec-item"></div>';}

  var html='';
  // Image hero (2:1 ratio)
  html+='<div class="detail-img-hero">';
  if(imgSrc){
    html+='<img src="'+imgSrc+'" alt="'+(item.nom||'')+'" loading="eager">';
  } else {
    html+='<div class="detail-img-ph"><div class="detail-img-ph-ico"><svg viewBox="0 0 80 60" fill="none" width="80" height="60"><rect x="4" y="4" width="72" height="52" rx="3" stroke="#3A2E1E" stroke-width="1.5" fill="none"/><circle cx="20" cy="22" r="8" stroke="#3A2E1E" stroke-width="1.2" fill="none"/><path d="M4 44l18-14 14 10 10-8 30 18" stroke="#3A2E1E" stroke-width="1.2" fill="none"/></svg></div><span class="detail-img-ph-lbl">AUCUNE IMAGE DISPONIBLE</span></div>';
  }
  html+='</div>';

  // 3 key characteristics
  html+='<div class="detail-keys">';
  html+='<div class="detail-key"><div class="dk-lbl">Inspiration / Modele reel</div><div class="dk-val spice">'+(item.inspiration||'—')+'</div></div>';
  html+='<div class="detail-key"><div class="dk-lbl">Designation officielle</div><div class="dk-val" style="font-size:16px;font-weight:500;">'+(item.nom||'—')+'</div></div>';
  html+='<div class="detail-key"><div class="dk-lbl">Cout unitaire</div><div class="dk-val gold">'+coutFmt+'</div></div>';
  html+='</div>';

  // Info bar
  html+='<div class="detail-info-bar">';
  html+='<span class="detail-fab">Fabricant : <strong>'+(item.fabricant||'—')+'</strong></span>';
  html+='<span class="slide-niv niv-'+niv+'" style="font-family:monospace;font-size:8px;padding:2px 8px;border-radius:2px;border:1px solid;display:inline-block;">'+nivLbl+'</span>';
  html+='<span style="font-family:monospace;font-size:10px;color:var(--teal-bright);">Disponibilite : '+dispo+'</span>';
  html+='</div>';

  // Specs section
  html+='<div class="detail-specs-wrap">';
  if(specKeys.length){
    html+='<div class="detail-specs-hdr">Caracteristiques techniques</div>';
    html+='<div class="detail-specs-grid">'+specItemsHTML+'</div>';
  } else {
    html+='<div style="font-family:monospace;font-size:10px;color:var(--text3);padding:12px 0;">Aucune caracteristique renseignee.</div>';
  }
  html+='</div>';

  document.getElementById('detail-body').innerHTML=html;
  document.getElementById('det-ref').textContent=(item.categorie||'').toUpperCase()+' · '+item.nom;
  var ov=document.getElementById('detail-ov');
  ov.classList.add('open');
  ov.querySelector('.detail-body').scrollTop=0;
  // Prevent main scroll
  document.getElementById('cat-main').style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('detail-ov').classList.remove('open');
  document.getElementById('cat-main').style.overflow='auto';
}

// Close on Escape key
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeDetail();
});

// ── THEME ─────────────────────────────────
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  var lbl=document.getElementById('tlbl');if(lbl)lbl.textContent=t==='dark'?'NUIT':'JOUR';
  localStorage.setItem('run-theme',t);
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
(function(){var s=localStorage.getItem('run-theme'),mq=window.matchMedia('(prefers-color-scheme: dark)');applyTheme(s||(mq.matches?'dark':'light'));})();

// ── INIT ──────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  loadLocal();
  renderSidebar();
  renderContent();
  syncGH();
});
</script>
<script src="../../pharos-auth.js"></script>

<div class="detail-ov" id="detail-ov">
  <nav class="detail-nav">
    <button class="detail-nav-back" onclick="closeDetail()">
      <svg viewBox="0 0 10 16" fill="none" width="8" height="12">
        <path d="M8 2L2 8l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Retour au catalogue
    </button>
    <div>
      <span class="detail-nav-ref" id="det-ref"></span>
    </div>
  </nav>
  <div class="detail-body" id="detail-body">
    <!-- populated by openDetail() -->
  </div>
</div>
