<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue Militaire · Forces Armées du Nil</title>
<meta name="robots" content="noindex,nofollow">
<meta property="og:image" content="https://BJBellum.github.io/UKN/assets/images/UKNSite.png">
<link rel="icon" type="image/png" href="../../assets/images/UKNSite.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/dune.css">
<style>
*{box-sizing:border-box;}
/* ── LAYOUT ── */
.cat-shell{display:flex;min-height:100vh;padding-top:60px;}
/* ── SIDEBAR ── */
.cat-sidebar{width:220px;flex-shrink:0;background:rgba(6,4,0,.99);border-right:1px solid var(--border);position:fixed;top:60px;left:0;bottom:0;overflow-y:auto;z-index:40;display:flex;flex-direction:column;}
[data-theme="light"] .cat-sidebar{background:rgba(195,170,120,.99);}
.sb-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.sb-hdr-title{font-family:'Dune Rise',serif;font-size:9px;letter-spacing:.2em;color:var(--spice);}
.sb-hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.1em;margin-top:2px;}
.sb-count{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.06em;padding:6px 16px;border-bottom:1px solid var(--border);}
.sb-search{padding:8px 12px;border-bottom:1px solid var(--border);}
.sb-search-in{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 8px;border-radius:2px;outline:none;transition:border-color .2s;}
.sb-search-in:focus{border-color:var(--spice);}
.sb-group{border-bottom:1px solid var(--border);}
.sb-group-hdr{display:flex;align-items:center;gap:7px;padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:.06em;cursor:pointer;transition:background .15s;user-select:none;}
.sb-group-hdr:hover{background:rgba(232,92,13,.04);}
.sb-group-icon{font-size:13px;flex-shrink:0;}
.sb-group-arrow{color:var(--text3);font-size:14px;transition:transform .2s;line-height:1;flex-shrink:0;}
.sb-group-arrow.open{transform:rotate(90deg);}
.sb-group-children{background:rgba(0,0,0,.12);}
[data-theme="light"] .sb-group-children{background:rgba(0,0,0,.04);}
.sb-cat-item{display:flex;align-items:center;justify-content:space-between;padding:7px 16px 7px 28px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.06em;cursor:pointer;transition:all .15s;border-left:2px solid transparent;user-select:none;}
.sb-sub-item{padding-left:28px;}
.sb-cat-item:hover{background:rgba(232,92,13,.05);color:var(--text2);}
.sb-cat-item.active{background:rgba(232,92,13,.1);color:var(--spice);border-left-color:var(--spice);}
.sb-cat-count{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}
.sb-cat-item.active .sb-cat-count{color:var(--spice);border-color:rgba(232,92,13,.3);}
/* ── MAIN ── */
.cat-main{margin-left:220px;flex:1;overflow-y:auto;}
.cat-topbar{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(8,5,0,.96);border-bottom:1px solid rgba(232,92,13,.2);position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:blur(8px);}
[data-theme="light"] .cat-topbar{background:rgba(220,195,150,.96);}
.cat-content{padding:28px 32px 60px;}
@media(max-width:860px){.cat-main{margin-left:0;}.cat-sidebar{display:none;}}
/* ── CATEGORY HEADER ── */
.cat-section-hdr{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.cat-section-icon{width:44px;height:44px;border:1px solid rgba(232,92,13,.35);border-radius:2px;display:flex;align-items:center;justify-content:center;background:rgba(232,92,13,.06);flex-shrink:0;}
.cat-section-title{font-family:'Dune Rise',serif;font-size:clamp(13px,1.8vw,18px);color:var(--spice);letter-spacing:.1em;}
.cat-section-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.08em;margin-top:3px;}
/* ── ITEM GRID ── */
.cat-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:32px;}
@media(max-width:600px){.cat-items{grid-template-columns:1fr;}}
.cat-item{background:var(--card-bg);border:1px solid var(--border);border-top:2px solid rgba(232,92,13,.4);transition:border-color .25s;display:flex;flex-direction:column;overflow:hidden;}
.cat-item:hover{border-color:var(--spice);border-top-color:var(--spice);}
/* Image zone */
.cat-item-img-zone{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg2);cursor:pointer;position:relative;}
.cat-item-img-zone img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.cat-item:hover .cat-item-img-zone img{transform:scale(1.03);}
.cat-item-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:pointer;}
.cat-item-img-ph-icon{font-size:28px;opacity:.25;}
/* Key badges */
.cat-item-badges{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);}
.cat-item-badge{padding:8px 10px;text-align:center;border-right:1px solid var(--border);}
.cat-item-badge:last-child{border-right:none;}
.cat-badge-lbl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;}
.cat-badge-val{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text);letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cat-badge-val.gold{color:var(--gold);font-family:'Dune Rise',serif;font-size:11px;}
.cat-badge-val.spice{color:var(--spice);}
/* Toggle header */
.cat-item-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.cat-item-hdr:hover{background:rgba(232,92,13,.04);}
.cat-item-niv{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 6px;border-radius:2px;border:1px solid;display:inline-block;}
.cat-item-arrow{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.cat-item.open .cat-item-arrow{transform:rotate(90deg);color:var(--spice);}
/* Spec panel */
.cat-spec-panel{display:none;padding:0 14px 14px;border-top:1px solid var(--border);background:rgba(0,0,0,.08);}
[data-theme="light"] .cat-spec-panel{background:rgba(0,0,0,.03);}
.cat-item.open .cat-spec-panel{display:block;}
.spec-table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:10px;margin-top:12px;}
.spec-table tr:hover td{background:rgba(232,92,13,.02);}
.spec-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top;}
.spec-table td:first-child{color:var(--text3);letter-spacing:.08em;width:45%;font-size:9px;}
.spec-table td:last-child{color:var(--text);letter-spacing:.04em;}
.spec-table tr:last-child td{border-bottom:none;}
/* ── EMPTY STATE ── */
.cat-empty{text-align:center;padding:60px 20px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.1em;}
.cat-empty-icon{margin-bottom:16px;opacity:.3;}
/* ── ACCESS WALL ── */
.access-wall{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.aw-inner{text-align:center;padding:52px 40px;border:1px solid rgba(232,92,13,.4);border-top:2px solid var(--spice);background:var(--card-bg);max-width:420px;width:90%;}
/* ── NIV COLORS ── */
.niv-1,.niv-2{color:#9B8060;border-color:rgba(155,128,96,.3);}
.niv-3,.niv-4{color:#C87830;border-color:rgba(200,120,48,.3);}
.niv-5,.niv-6{color:#D4A843;border-color:rgba(212,168,67,.3);}
.niv-7,.niv-8{color:#22B89A;border-color:rgba(34,184,154,.3);}
.niv-9,.niv-10{color:#4A9EFF;border-color:rgba(74,158,255,.3);}
.niv-11,.niv-12{color:#E85C0D;border-color:rgba(232,92,13,.3);}
</style>
</head>
<body>

<!-- NAV -->
<nav class="cat-topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-family:'Dune Rise',serif;font-size:10px;letter-spacing:.18em;color:var(--spice);">Catalogue Militaire</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.1em;border:1px solid rgba(232,92,13,.2);padding:2px 7px;border-radius:2px;">CAT-MIL-001</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <!-- pharos-auth injects here -->
    <a href="../" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:5px 10px;border-radius:2px;">← Catalogues</a>
    <button onclick="toggleTheme()" style="background:transparent;border:1px solid var(--border);color:var(--text3);padding:5px 10px;font-family:'IBM Plex Mono',monospace;font-size:9px;cursor:pointer;border-radius:2px;"><span id="toggle-lbl">NUIT</span></button>
  </div>
</nav>

<div id="main-content" class="cat-shell">
  <!-- SIDEBAR -->
  <aside class="cat-sidebar">
    <div class="sb-hdr">
      <div class="sb-hdr-title">Categories</div>
      <div class="sb-hdr-sub">Forces Armées du Nil · 2305</div>
    </div>
    <div class="sb-count" id="sb-total-count">— équipements</div>
    <div class="sb-search">
      <input type="text" class="sb-search-in" id="cat-search" placeholder="Rechercher…" oninput="filterItems()">
    </div>
    <div id="cat-sidebar-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="cat-main">
    <div class="cat-content" id="cat-content">
      <div class="cat-empty">
        <div class="cat-empty-icon">
          <svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 8L8 14V24C8 34 15 42 24 45C33 42 40 34 40 24V14L24 8Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/></svg>
        </div>
        Sélectionnez une catégorie dans la barre latérale.
      </div>
    </div>
  </main>
</div>

<script>
// ── CONFIG ──
const TECH_MAP={1:'1910-1919',2:'1920-1929',3:'1930-1939',4:'1940-1949',5:'1950-1959',6:'1960-1969',7:'1970-1979',8:'1980-1989',9:'1990-1999',10:'2000-2009',11:'2010-2019',12:'2020-∞'};

const CATEGORIES=[
  {id:'armes-feu',label:'Armes à Feu',icon:'🔫'},
  {id:'explosifs',label:'Explosifs',icon:'💥'},
  {id:'vehicules-terrestres',label:'Véhicules Terrestres',icon:'🚗'},
  {id:'artillerie',label:'Artillerie Placée',icon:'🔭'},
  {id:'missiles',label:'Missiles',icon:'🚀'},
  {id:'missiles-strategiques',label:'Missiles Stratégiques',icon:'☢'},
  {id:'aeronefs',label:'Véhicules Aériens',icon:'✈'},
  {id:'navires',label:'Navires de Surface',icon:'⚓'},
  {id:'sous-marins',label:'Sous-marins',icon:'🌊'},
];

// ── STATE ──
let catalogue=[];
let activeCategory='';
let searchQuery='';

// ── LOAD DATA ──
function loadCatalogue(){
  try{
    const s=localStorage.getItem('cat_militaire');
    catalogue=s?JSON.parse(s):[];
  }catch(_){catalogue=[];}
}

async function syncFromGH(){
  try{
    const r=await fetch('https://api.github.com/repos/BJBellum/UKN/contents/data/catalogue-militaire.json',{
      headers:{'Accept':'application/vnd.github.v3.raw'},cache:'no-store'
    });
    if(!r.ok)return;
    const d=await r.json();
    if(Array.isArray(d)&&d.length){
      // Merge: keep local image_data if GitHub doesn't have it
      d.forEach(remote=>{
        const local=catalogue.find(x=>x.id===remote.id);
        if(local&&local.image_data&&!remote.image_data)remote.image_data=local.image_data;
      });
      catalogue=d;
      localStorage.setItem('cat_militaire',JSON.stringify(catalogue));
    }
  }catch(_){}
}

// ── RENDER ──
// Track open groups
let openGroups=new Set(['terrestre','missile-spatial','naval-aerien']);
function renderSidebar(){
  const el=document.getElementById('cat-sidebar-list');
  if(!el)return;
  const total=catalogue.length;
  const tc=document.getElementById('sb-total-count');
  if(tc)tc.textContent=`${total} équipement${total!==1?'s':''}`;

  el.innerHTML=CAT_GROUPS.map(g=>{
    const groupTotal=catalogue.filter(i=>g.sub.some(s=>s.id===i.categorie)).length;
    const isOpen=openGroups.has(g.id);
    return`<div class="sb-group">
      <div class="sb-group-hdr" onclick="toggleGroup('${g.id}')">
        <span class="sb-group-arrow${isOpen?' open':''}">›</span>
        <span class="sb-group-icon">${g.icon}</span>
        <span style="flex:1;">${g.label}</span>
        <span class="sb-cat-count">${groupTotal}</span>
      </div>
      ${isOpen?`<div class="sb-group-children">
        ${g.sub.map(cat=>{
          const count=catalogue.filter(i=>i.categorie===cat.id).length;
          const isActive=cat.id===activeCategory;
          return`<div class="sb-cat-item sb-sub-item${isActive?' active':''}" onclick="selectCategory('${cat.id}')">
            <span>${cat.label}</span>
            <span class="sb-cat-count">${count}</span>
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}
function toggleGroup(id){
  if(openGroups.has(id))openGroups.delete(id);
  else openGroups.add(id);
  renderSidebar();
}

function selectCategory(id){
  activeCategory=id;
  searchQuery=document.getElementById('cat-search')?.value||'';
  renderSidebar();
  renderContent();
}

function filterItems(){
  searchQuery=document.getElementById('cat-search')?.value.toLowerCase()||'';
  renderContent();
}

function nivClass(n){return`niv-${n}`;}

function renderContent(){
  const el=document.getElementById('cat-content');
  if(!el)return;

  let items=catalogue;
  if(activeCategory)items=items.filter(i=>i.categorie===activeCategory);
  if(searchQuery)items=items.filter(i=>
    i.nom?.toLowerCase().includes(searchQuery)||
    i.fabricant?.toLowerCase().includes(searchQuery)||
    i.inspiration?.toLowerCase().includes(searchQuery)
  );

  if(!items.length){
    const msg=activeCategory?`Aucun équipement dans cette catégorie.`:`Sélectionnez une catégorie.`;
    el.innerHTML=`<div class="cat-empty">
      <div class="cat-empty-icon"><svg viewBox="0 0 48 48" fill="none" width="48" height="48"><path d="M24 8L8 14V24C8 34 15 42 24 45C33 42 40 34 40 24V14L24 8Z" stroke="#4A3C28" stroke-width="1.5" fill="none"/></svg></div>
      ${msg}
    </div>`;
    return;
  }

  // Section header
  const cat=CATEGORIES.find(c=>c.id===activeCategory);
  let html='';
  if(cat){
    html+=`<div class="cat-section-hdr">
      <div class="cat-section-icon"><span style="font-size:22px;">${cat.icon}</span></div>
      <div>
        <div class="cat-section-title">${cat.label.toUpperCase()}</div>
        <div class="cat-section-sub">${items.length} équipement${items.length!==1?'s':''} · Exercice 2305</div>
      </div>
    </div>`;
  }

  html+='<div class="cat-items">';
  items.forEach((item,i)=>{
    const niv=item.niveau||1;
    const nivLabel=`NIV ${niv} · ${TECH_MAP[niv]||''}`;
    const imgSrc=item.image_data||
      (item.image_path?`https://bjbellum.github.io/UKN/${item.image_path}`:null);

    // Build spec table rows
    const specs=item.specs||{};
    const specRows=Object.entries(specs).filter(([k,v])=>v).map(([k,v])=>
      `<tr><td>${k}</td><td>${v}</td></tr>`
    ).join('');

    html+=`<div class="cat-item" id="item-${item.id}">
      <div class="cat-item-hdr" onclick="toggleItem('${item.id}')">
        ${imgSrc
          ?`<img class="cat-item-img" src="${imgSrc}" alt="${item.nom}" loading="lazy">`
          :`<div class="cat-item-img-ph"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><rect x="3" y="5" width="18" height="14" rx="1" stroke="#4A3C28" stroke-width="1" fill="none"/><circle cx="8" cy="10" r="2" stroke="#4A3C28" stroke-width="1" fill="none"/><path d="M3 15l5-4 4 3 3-2 6 5" stroke="#4A3C28" stroke-width="1" fill="none"/></svg></div>`
        }
        <div class="cat-item-meta">
          <div class="cat-item-name">${item.nom||'—'}</div>
          <div class="cat-item-fab">${item.fabricant||'—'}</div>
          <div class="cat-item-tags">
            <span class="cat-item-niv ${nivClass(niv)}">${nivLabel}</span>
            ${item.inspiration?`<span class="cat-item-inspi">Inspiré : ${item.inspiration}</span>`:''}
          </div>
        </div>
        ${item.cout_unite?`<div class="cat-item-cout">${Number(item.cout_unite).toLocaleString('fr')} Cr.</div>`:''}
        <div class="cat-item-arrow">▶</div>
      </div>
      <div class="cat-spec-panel">
        <div class="spec-layout">
          <div>
            ${imgSrc
              ?`<div class="spec-img-box"><img class="spec-img-full" src="${imgSrc}" alt="${item.nom}" loading="lazy"></div>`
              :`<div class="spec-img-box"><div class="spec-img-ph">Aucune image</div></div>`
            }
            <div style="margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);line-height:1.7;">
              <div style="color:var(--spice);letter-spacing:.08em;margin-bottom:4px;">INFORMATIONS GÉNÉRALES</div>
              <div>Fabricant : <span style="color:var(--text2);">${item.fabricant||'—'}</span></div>
              <div>Coût unitaire : <span style="color:var(--gold);">${item.cout_unite?Number(item.cout_unite).toLocaleString('fr')+' Cr.':'—'}</span></div>
              <div>Niveau tech. : <span class="cat-item-niv ${nivClass(niv)}" style="display:inline;">${nivLabel}</span></div>
              ${item.inspiration?`<div>Inspiré de : <span style="color:var(--text2);">${item.inspiration}</span></div>`:''}
            </div>
          </div>
          <div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.14em;color:var(--spice);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(232,92,13,.2);">Fiche Technique</div>
            ${specRows?`<table class="spec-table"><tbody>${specRows}</tbody></table>`
              :'<div style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:var(--text3);">Aucune spécification renseignée.</div>'}
          </div>
        </div>
      </div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function toggleItem(id){
  const el=document.getElementById('item-'+id);
  if(el)el.classList.toggle('open');
}

// ── THEME ──
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);const lbl=document.getElementById('toggle-lbl');if(lbl)lbl.textContent=t==='dark'?'NUIT':'JOUR';localStorage.setItem('run-theme',t);}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
(function(){const s=localStorage.getItem('run-theme'),mq=window.matchMedia('(prefers-color-scheme: dark)');applyTheme(s||(mq.matches?'dark':'light'));})();

// ── AUTH ──
(function(){
  const STATE=btoa(encodeURIComponent(window.location.href));
  const url=`https://discord.com/oauth2/authorize?client_id=1483200078092042300&redirect_uri=${encodeURIComponent('https://BJBellum.github.io/UKN/auth/callback/')}&response_type=token&scope=identify&state=${STATE}`;
  const btn=document.getElementById('auth-btn');
  if(btn)btn.href=url;
})();

window.addEventListener('DOMContentLoaded',()=>{
  loadCatalogue();
  syncFromGH().finally(()=>{renderSidebar();renderContent();});
});
</script>
<script src="../../pharos-auth.js"></script>
</body>
</html>
