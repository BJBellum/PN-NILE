<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion · UKN</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0c10; color: #e2e6f0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 16px; text-align: center;
    padding: 24px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(27,189,138,0.2); border-top-color: #1bbd8a;
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg  { font-size: 13px; color: #8b93a8; letter-spacing: 0.06em; margin-top: 8px; }
  .err  { color: #e84848; font-size: 12px; max-width: 420px; line-height: 1.7; margin-top: 16px; }
  .back {
    display: inline-block; margin-top: 20px;
    font-size: 12px; color: #1bbd8a; text-decoration: none;
    border: 1px solid rgba(27,189,138,0.4); border-radius: 6px; padding: 8px 18px;
    transition: background .2s;
  }
  .back:hover { background: rgba(27,189,138,0.08); }
</style>
</head>
<body>

<div class="spinner" id="spinner"></div>
<div class="msg"  id="msg">Connexion Discord en cours…</div>
<div class="err"  id="err"  style="display:none;"></div>
<a   class="back" id="back" href="https://BJBellum.github.io/UKN/" style="display:none;">
  ← Retour au portail
</a>

<script>
(function () {
  const KEY_TOKEN = 'ukn_token';
  const KEY_USER  = 'ukn_user';
  const BASE      = 'https://BJBellum.github.io/UKN/';

  function fail(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Échec de la connexion';
    const e = document.getElementById('err');
    e.textContent = msg; e.style.display = 'block';
    document.getElementById('back').style.display = 'inline-block';
  }

  function parseHash() {
    const h = window.location.hash.replace(/^#/, '');
    if (!h) return {};
    return Object.fromEntries(new URLSearchParams(h));
  }

  function decodeState(state) {
    if (!state || state === 'home') return BASE;
    try {
      const url = decodeURIComponent(atob(state));
      if (url.startsWith(BASE) && !url.includes('/admin/')) return url;
    } catch {}
    // fallback: essaie l'ancien encodage sans encodeURIComponent
    try {
      const url = atob(state);
      if (url.startsWith(BASE) && !url.includes('/admin/')) return url;
    } catch {}
    return BASE;
  }

  async function run() {
    const p = parseHash();

    if (p.error) {
      fail('Discord : ' + (p.error_description || p.error).replace(/\+/g, ' '));
      return;
    }

    if (!p.access_token) {
      fail('Aucun token reçu. Vérifie que le Client ID et l\'URI de redirection sont corrects dans le Discord Developer Portal.');
      return;
    }

    // Sauvegarder le token en localStorage avec son expiry
    try {
      const expires = Date.now() + (parseInt(p.expires_in, 10) || 604800) * 1000;
      localStorage.setItem(KEY_TOKEN, JSON.stringify({ token: p.access_token, expires }));
      localStorage.removeItem(KEY_USER); // forcer re-fetch du profil
    } catch (e) {
      fail('Impossible d\'accéder au stockage local (mode privé ?).');
      return;
    }

    document.getElementById('msg').textContent = 'Connecté ! Redirection…';
    document.getElementById('spinner').style.borderTopColor = '#1bbd8a';

    const returnURL = decodeState(p.state);
    setTimeout(() => window.location.replace(returnURL), 600);
  }

  run().catch(e => fail('Erreur inattendue : ' + e.message));
})();
</script>
</body>
</html>
