<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentification · Royaume-Uni du Nil</title>
<link rel="icon" type="image/png" href="../../assets/images/UKNSite.png">
<link rel="stylesheet" href="../../assets/dune.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:var(--bg);}
.auth-box{text-align:center;padding:48px 32px;background:var(--card-bg);border:1px solid var(--border);border-top:2px solid #4A7FD4;max-width:380px;width:90%;}
.auth-icon{margin-bottom:20px;opacity:.8;}
.auth-title{font-family:'Dune Rise',serif;font-size:16px;color:var(--gold-pale);letter-spacing:.08em;margin-bottom:8px;}
.auth-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;line-height:1.8;}
.auth-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:#4A7FD4;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto 0;}
.auth-error{color:var(--spice);font-size:10px;font-family:'IBM Plex Mono',monospace;margin-top:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-icon">
    <svg viewBox="0 0 40 40" fill="none" width="40" height="40">
      <path d="M20 4L5 11V20C5 29 11.5 37 20 39C28.5 37 35 29 35 20V11L20 4Z" stroke="#4A7FD4" stroke-width="1.5" fill="none"/>
      <circle cx="20" cy="21" r="5" stroke="#4A7FD4" stroke-width="1.2" fill="none"/>
      <line x1="20" y1="16" x2="20" y2="12" stroke="#4A7FD4" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="auth-title" id="auth-title">Authentification</div>
  <div class="auth-sub" id="auth-sub">Vérification en cours…</div>
  <div class="auth-spinner" id="auth-spinner"></div>
  <div class="auth-error" id="auth-error" style="display:none;"></div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');
  const error  = params.get('error');

  const titleEl   = document.getElementById('auth-title');
  const subEl     = document.getElementById('auth-sub');
  const spinnerEl = document.getElementById('auth-spinner');
  const errorEl   = document.getElementById('auth-error');

  function showError(msg) {
    spinnerEl.style.display = 'none';
    titleEl.textContent = 'Erreur';
    subEl.textContent = 'Authentification échouée.';
    errorEl.style.display = 'block';
    errorEl.textContent = msg;
    setTimeout(() => { window.location.href = '/'; }, 4000);
  }

  // Handle Discord OAuth errors
  if (error) {
    showError(`Discord: ${error} — ${params.get('error_description') || ''}`);
    return;
  }

  if (!code) {
    showError('Aucun code reçu.');
    return;
  }

  // Pass the code + state to our server-side handler
  // The server will exchange code for token and set the session cookie
  const callbackURL = `/api/auth/discord?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state || '')}`;

  subEl.textContent = 'Connexion au serveur…';

  // Redirect to the API route which handles the code exchange
  // It will then redirect back to the original page
  window.location.href = callbackURL;
})();
</script>
</body>
</html>
